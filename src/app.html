<!doctype html>
<html lang="en">

<head>
	<meta charset="utf-8" />
	<!-- SVG for modern browsers -->
	<link rel="icon" type="image/svg+xml" href="/favicon.svg">
	<!-- PNG/ICO fallback for older browsers -->
	<link rel="icon" type="image/png" href="/favicon.png">
	<!-- Legacy IE fallback -->
	<link rel="shortcut icon" href="/favicon.ico">
	<meta name="viewport" content="width=device-width, initial-scale=1" />
	<link rel="preload" href="/fonts/CalSansUI[wght,GEOM].woff2" as="font" type="font/woff2" crossorigin="anonymous" />
	<link rel="preload" href="/fonts/CalSans-Regular.woff2" as="font" type="font/woff2" crossorigin="anonymous" />
	<link rel="preload" href="/fonts/PaperMono-Regular.woff2" as="font" type="font/woff2" crossorigin="anonymous" />
	<link rel="manifest" href="%sveltekit.assets%/site.webmanifest" />
	%sveltekit.head%
</head>

<body class="relative bg-sidebar font-sans text-foreground antialiased" data-sveltekit-preload-data="hover">
	<div class="isolate relative flex min-h-svh flex-col">
		%sveltekit.body%
	</div>
</body>

</html>
